<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Password Strength Analyser</title>
  <style>
    :root {
      --primary: #4f46e5;
      --weak: #ef4444;
      --medium: #f59e0b;
      --strong: #10b981;
    }

    body {
      font-family: Arial, sans-serif;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      background: #f5f5f5;
    }

    .container {
      background: white;
      padding: 25px;
      border-radius: 15px;
      box-shadow: 0 10px 25px rgba(0,0,0,0.1);
      width: 340px;
      text-align: center;
    }

    input {
      width: 100%;
      padding: 10px;
      margin-top: 10px;
      border-radius: 8px;
      border: 1px solid #ccc;
      font-size: 16px;
    }

    .progress-bar {
      height: 10px;
      background: #eee;
      border-radius: 5px;
      margin-top: 15px;
      overflow: hidden;
    }

    .progress {
      height: 100%;
      width: 0%;
      transition: width 0.3s ease;
    }

    .strength-text {
      margin-top: 10px;
      font-weight: bold;
    }

    .crack-time {
      font-size: 13px;
      margin-top: 5px;
      color: #555;
    }

    .egg {
      font-size: 70px;
      margin-top: 20px;
      min-height: 80px;
    }
  </style>
</head>
<body>

<div class="container">
  <h2>Password Strength Analyser</h2>
  <input type="password" id="password" placeholder="Enter password..." />

  <div class="progress-bar">
    <div class="progress" id="progress"></div>
  </div>

  <div class="strength-text" id="strengthText">Score: 0/10</div>
  <div class="crack-time" id="crackTime"></div>

  <div class="egg" id="egg"></div>
</div>

<script>
function calculateStrength(password) {
  let score = 0;

  if (!password) return 0;

  if (password.length >= 8) score += 2;
  if (password.length >= 12) score += 2;

  if (/[A-Z]/.test(password)) score += 2;
  if (/[a-z]/.test(password)) score += 1;
  if (/[0-9]/.test(password)) score += 2;
  if (/[^A-Za-z0-9]/.test(password)) score += 1;

  return Math.min(score, 10);
}

function getLabel(score) {
  if (score <= 2) return "Very Weak";
  if (score <= 4) return "Weak";
  if (score <= 6) return "Moderate";
  if (score <= 8) return "Strong";
  return "Very Strong";
}

// Realistic attack modelling (simplified but more credible)
function estimateCrackTime(password) {
  if (!password) return "";

  let charset = 0;
  if (/[a-z]/.test(password)) charset += 26;
  if (/[A-Z]/.test(password)) charset += 26;
  if (/[0-9]/.test(password)) charset += 10;
  if (/[^A-Za-z0-9]/.test(password)) charset += 32;

  const entropy = Math.log2(Math.pow(charset, password.length));

  // Different attack scenarios
  let guessesPerSecond;

  if (entropy < 40) {
    guessesPerSecond = 1e12; // offline GPU attack
  } else if (entropy < 60) {
    guessesPerSecond = 1e10; // fast cracking rig
  } else {
    guessesPerSecond = 1e8; // online rate-limited
  }

  const guesses = Math.pow(2, entropy);
  const seconds = guesses / guessesPerSecond;

  if (seconds < 60) return "Cracked instantly";
  if (seconds < 3600) return Math.round(seconds/60) + " minutes";
  if (seconds < 86400) return Math.round(seconds/3600) + " hours";
  if (seconds < 31536000) return Math.round(seconds/86400) + " days";
  if (seconds < 3153600000) return Math.round(seconds/31536000) + " years";
  return "Millions of years";
}

function getEgg(score) {
  if (score === 0) return "";
  if (score <= 2) return "🍳"; // fried egg
  if (score <= 4) return "🐥"; // chick
  if (score <= 6) return "🐣"; // keep same
  if (score === 8) return "🥚"; // plain egg
  if (score >= 9) return "🥚🐔"; // egg + adult chicken
  return "🥚";
}

function getColor(score) {
  if (score <= 4) return getComputedStyle(document.documentElement).getPropertyValue('--weak');
  if (score <= 7) return getComputedStyle(document.documentElement).getPropertyValue('--medium');
  return getComputedStyle(document.documentElement).getPropertyValue('--strong');
}

const passwordInput = document.getElementById("password");
const progress = document.getElementById("progress");
const strengthText = document.getElementById("strengthText");
const crackTime = document.getElementById("crackTime");
const egg = document.getElementById("egg");

passwordInput.addEventListener("input", () => {
  const password = passwordInput.value;
  const score = calculateStrength(password);
  const label = getLabel(score);

  progress.style.width = (score * 10) + "%";
  progress.style.background = getColor(score);

  strengthText.textContent = `Score: ${score}/10 (${label})`;
  crackTime.textContent = password ? `Estimated crack time: ${estimateCrackTime(password)}` : "";

  egg.textContent = getEgg(score);
});
</script>

</body>
</html>
